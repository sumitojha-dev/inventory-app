<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CloudStock</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div id="auth-container">
    <h2 id="auth-title">Login</h2>
    <form id="auth-form">
        <input type="text" id="auth-username" placeholder="Username" style="display:none;">
        <input type="email" id="auth-email" placeholder="Email" required>
        <input type="password" id="auth-password" placeholder="Password" required>
        <button type="submit" id="auth-btn">Login</button>
    </form>
    <p id="toggle-auth">Don't have an account? Register</p>
</div>

<div id="app-container" style="display:none;">
    <h2>Welcome <span id="username"></span></h2>
    <button onclick="logout()">Logout</button>

    <h3>Add Product</h3>
    <form id="product-form">
        <input id="name" placeholder="Name" required>
        <input id="price" type="number" placeholder="Price" required>
        <input id="quantity" type="number" placeholder="Quantity" required>
        <input id="category" placeholder="Category" required>
        <button>Add</button>
    </form>

    <h3>Products</h3>
    <ul id="products"></ul>

    <h3>Orders</h3>
    <form id="order-form">
        <select id="product-select"></select>
        <input id="order-qty" type="number" placeholder="Quantity" required>
        <button>Order</button>
    </form>

    <ul id="orders"></ul>
</div>

<script src="script.js"></script>
</body>
</html>
